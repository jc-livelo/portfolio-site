<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!--
    Panda paw cursor — 24x24px
    Hotspot set in CSS at (4, 2) — top-left of the palm.
    Black fill with white stroke so it reads on both dark and light backgrounds.
  -->

  <!-- Toe beans (4 across the top) -->
  <ellipse cx="5"  cy="7"  rx="2.4" ry="2"   fill="#000000" stroke="#ffffff" stroke-width="1.2"/>
  <ellipse cx="10" cy="4.5" rx="2.4" ry="2"  fill="#000000" stroke="#ffffff" stroke-width="1.2"/>
  <ellipse cx="15" cy="4.5" rx="2.4" ry="2"  fill="#000000" stroke="#ffffff" stroke-width="1.2"/>
  <ellipse cx="20" cy="7"  rx="2.4" ry="2"   fill="#000000" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Main palm pad -->
  <ellipse cx="12.5" cy="16" rx="8" ry="7"   fill="#000000" stroke="#ffffff" stroke-width="1.2"/>
</svg>
